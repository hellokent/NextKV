plugins {
    id 'java'
    id 'application'
}

java {
    sourceCompatibility = JavaVersion.VERSION_11
    targetCompatibility = JavaVersion.VERSION_11
}

dependencies {
    implementation 'org.rocksdb:rocksdbjni:8.10.0'
    implementation 'org.mapdb:mapdb:3.0.9'
    implementation 'org.lmdbjava:lmdbjava:0.9.0'
    implementation 'net.openhft:chronicle-map:3.22.9'
    implementation 'org.jetbrains.xodus:xodus-environment:2.0.1'
    implementation 'org.dizitart:nitrite:3.4.4'
    implementation 'com.h2database:h2:2.2.224'
    implementation 'org.iq80.leveldb:leveldb:0.12'
}

application {
    mainClass = 'com.nextkv.Benchmark'
    applicationDefaultJvmArgs = [
        '-Xmx2g', 
        '-Djava.library.path=src/main/resources',
        '--add-exports=java.base/jdk.internal.ref=ALL-UNNAMED',
        '--add-exports=java.base/sun.nio.ch=ALL-UNNAMED',
        '--add-exports=jdk.unsupported/sun.misc=ALL-UNNAMED',
        '--add-exports=java.base/sun.nio.cs=ALL-UNNAMED',
        '--add-opens=java.base/java.lang=ALL-UNNAMED',
        '--add-opens=java.base/java.nio=ALL-UNNAMED',
        '--add-opens=java.base/java.lang.reflect=ALL-UNNAMED',
        '--add-opens=java.base/java.io=ALL-UNNAMED',
        '--add-opens=java.base/java.util=ALL-UNNAMED'
    ]
}

task compileJNI(type: Exec) {
    def osName = System.getProperty("os.name").toLowerCase()
    def isMac = osName.contains("mac")
    def ext = isMac ? "dylib" : "so"
    def outDir = file("$buildDir/classes/java/main")
    def resourceDir = file("src/main/resources")
    outDir.mkdirs()
    resourceDir.mkdirs()

    def javaHome = System.getProperty('java.home')
    def cppFile1 = file("../app/src/main/cpp/nextkv/NextKV.cpp").absolutePath
    def cppFile2 = file("src/main/cpp/server_jni.cpp").absolutePath
    
    // We just compile simple clang++ command line. 
    // Assumes clang++ is installed on Mac (it usually is).
    
    def argsList = ['clang++', '-O3', '-shared', '-fPIC', '-std=c++17']
    
    // For ARM64 Macs we need crc support for our fast_hash
    if (isMac && System.getProperty("os.arch").contains("aarch64")) {
        argsList.add('-mcrc')
    }

    argsList.addAll([
        "-I", "$javaHome/include",
        "-I", "$javaHome/include/darwin", // Mac
        "-I", "$javaHome/include/linux",  // Linux
        cppFile1, cppFile2,
        "-o", "$resourceDir/libnextkv.$ext"
    ])
    
    commandLine argsList
}

classes.dependsOn compileJNI